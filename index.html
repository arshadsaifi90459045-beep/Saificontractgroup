<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIFI CONTRACTOR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161616;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 2px solid #d4af37;
        }
        h1 {
            color: #d4af37;
            font-size: 2.4rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .tagline {
            font-size: 1rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
            margin: 20px 0;
        }
        .intro-text {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .services-list {
            background: #222222;
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 5px solid #d4af37;
            text-align: left;
            margin: 20px 0;
        }
        .services-list p {
            margin: 12px 0;
            font-size: 1.1rem;
            color: #ffffff;
        }
        .services-list p::before {
            content: "🔸 ";
            color: #d4af37;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SAIFI CONTRACTOR</h1>
        <div class="tagline">Your Trust, Our Commitment</div>
        
        <hr>
        
        <p class="intro-text">Our Premium Services:</p>
        
        <div class="services-list">
            <p>Interior Designer</p>
            <p>Tiles Work</p>
            <p>Wall Putty</p>
            <p>Luxury Furniture</p>
            <p>Fabrication</p>
        </div>
        
        <hr>
        
        <div class="footer">© 2026 Saifi Contractor. All Rights Reserved.</div>
    </div>
</body>
</html>
